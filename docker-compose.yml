services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    ports:
      - "8080:8080"    # HTTP  — weaviate.connect_to_local(port=8080)
      - "50051:50051"  # gRPC  — weaviate.connect_to_local(grpc_port=50051)
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none        # we supply our own vectors (bge-m3)
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      CLUSTER_HOSTNAME: node1
    restart: unless-stopped

volumes:
  weaviate_data:   # named volume — data survives container restarts
